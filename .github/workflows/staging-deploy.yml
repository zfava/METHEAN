name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Seed demo data"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create staging env file
        run: cp .env.staging.example .env.staging

      - name: Validate staging compose
        run: docker compose -f docker-compose.staging.yml config --quiet

      - name: Build images
        run: docker compose -f docker-compose.staging.yml build

      - name: Start staging
        run: |
          docker compose -f docker-compose.staging.yml up -d
          sleep 15

      - name: Run migrations
        run: docker compose -f docker-compose.staging.yml exec -T backend alembic upgrade head

      - name: Seed demo data
        if: ${{ inputs.run_seed == 'true' }}
        run: docker compose -f docker-compose.staging.yml exec -T backend python scripts/seed_demo.py

      - name: Health check
        run: |
          curl -f http://localhost:8100/health || exit 1
          curl -f http://localhost:8100/health/ready || exit 1

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v
