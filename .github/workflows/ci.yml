name: METHEAN CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend Tests ───
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: methean_test
          POSTGRES_PASSWORD: methean_test
          POSTGRES_DB: methean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      DATABASE_URL: postgresql+asyncpg://methean_test:methean_test@localhost:5432/methean_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET: ci-test-secret-not-for-production-use-64chars-long-minimum-xxxxx
      APP_ENV: test
      AI_MOCK_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov ruff bandit

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Route contract check
        working-directory: backend
        run: pytest tests/test_route_contract.py -v

      - name: Route auth contract check
        working-directory: backend
        run: pytest tests/test_unauthenticated_paths.py -v

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -x -v

      - name: Check coverage threshold
        working-directory: backend
        run: coverage report --fail-under=35

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── Backend Linting ───
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linters
        run: pip install ruff bandit

      - name: Ruff check
        working-directory: backend
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/

      - name: Bandit security scan
        working-directory: backend
        run: bandit -r app/ -c pyproject.toml --severity-level high

      - name: Dependency audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc on --fix --dry-run || true

  # ─── Frontend Checks ───
  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: TypeScript compilation check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: frontend
        run: npx next lint

      - name: Build check
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ─── Migration Safety ───
  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: methean_test
          POSTGRES_PASSWORD: methean_test
          POSTGRES_DB: methean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      DATABASE_URL: postgresql+asyncpg://methean_test:methean_test@localhost:5432/methean_test
      JWT_SECRET: ci-test-secret
      APP_ENV: test
      AI_MOCK_ENABLED: "true"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upgrade to head
        working-directory: backend
        run: alembic upgrade head

      - name: Downgrade to base
        working-directory: backend
        run: alembic downgrade base

      - name: Re-upgrade (idempotent check)
        working-directory: backend
        run: alembic upgrade head

  # ─── E2E Tests ───
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: methean_test
          POSTGRES_PASSWORD: methean_test
          POSTGRES_DB: methean_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://methean_test:methean_test@localhost:5432/methean_test
      DATABASE_URL_SYNC: postgresql://methean_test:methean_test@localhost:5432/methean_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      JWT_SECRET: ci-test-secret-not-for-production-use-64chars-long-minimum-xxxxx
      APP_ENV: test
      AI_MOCK_ENABLED: "true"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:8000 &
          sleep 5
          curl -f http://localhost:8000/health || exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Start frontend
        working-directory: frontend
        run: |
          npm run start &
          sleep 5

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
