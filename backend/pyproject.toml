[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function call in default arg (FastAPI Depends pattern)
    "B007",  # unused loop variable (often intentional in SQLAlchemy patterns)
    "B904",  # raise from in except (too noisy for advisory try/except blocks)
    "B905",  # zip strict (Python 3.10+, but we use manual patterns)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "S106"]
"app/main.py" = ["E402"]  # FastAPI router imports after app creation

[tool.bandit]
exclude_dirs = ["tests"]
skips = ["B101"]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/content/*",
    "app/tasks/worker.py",
]

[tool.coverage.report]
fail_under = 60
show_missing = true
skip_empty = true
