  /api/v1/learning-maps/{map_id}/credit-summary:
    get:
      tags:
      - curriculum
      summary: Get Credit Summary
      description: 'Aggregate credit hours across all active nodes in a map.


        child_id: optional query parameter. If omitted, falls back to the

        current user''s linked_child_id (set during self-directed

        registration). Credits are counted as "earned" when the child has

        mastery_level of proficient or mastered on that node.'
      operationId: get_credit_summary_api_v1_learning_maps__map_id__credit_summary_get
      parameters:
      - name: map_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Map Id
      - name: child_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Child Id
      - name: access_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
