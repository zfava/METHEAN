openapi: 3.1.0
info:
  title: METHEAN
  description: Learning governance operating system for homeschool families
  version: 0.1.0
paths:
  /metrics:
    get:
      summary: Metrics
      description: Endpoint that serves Prometheus metrics.
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/register:
    post:
      tags:
      - auth
      summary: Register
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/register-institution:
    post:
      tags:
      - auth
      summary: Register Institution
      description: 'Bootstrap an institution: creates the household, the admin user,

        and returns auth tokens so the admin is immediately logged in.'
      operationId: register_institution_api_v1_auth_register_institution_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstitutionalRegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/invite:
    post:
      tags:
      - auth
      summary: Invite User
      description: 'Invite a user into an institution-governed household.


        Only department admins may invite. Instructors get co_parent-level

        grants, TAs and students get observer. Students also receive a

        Child record and a self-scoped view_progress grant so one student

        cannot read another student''s data.'
      operationId: invite_user_api_v1_auth_invite_post
      parameters:
      - name: access_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app__schemas__auth__InviteRequest'
      responses:
        '201':
          description: Successful Response
